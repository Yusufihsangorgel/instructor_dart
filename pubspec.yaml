name: instructor_dart
description: >-
  Typed, validated structured outputs from LLMs. Build a JSON Schema in plain
  Dart, with validation and repair retries. Adapters for OpenAI, Anthropic and
  Gemini.
version: 0.5.0
repository: https://github.com/Yusufihsangorgel/instructor_dart
issue_tracker: https://github.com/Yusufihsangorgel/instructor_dart/issues

topics:
  - llm
  - structured-output
  - openai
  - anthropic
  - ollama

screenshots:
  - description: >-
      The model answers a forced tool call; the reply is validated against the s
      chema, and a mismatch is fed back with its errors for a retry.
    path: doc/architecture.png

environment:
  sdk: ^3.4.0

dependencies:
  http: ^1.2.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
