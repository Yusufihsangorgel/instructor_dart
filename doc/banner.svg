<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#E2E8F0" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" fill="#0B1220"/>
  <rect width="1200" height="400" fill="url(#dots)"/>

  <!-- type lockup, lower left -->
  <rect x="66" y="200" width="44" height="6" fill="#38BDF8"/>
  <text x="64" y="292" font-family="Menlo, monospace" font-size="64" font-weight="bold" fill="#E2E8F0">instructor_dart</text>
  <text x="66" y="338" font-family="Menlo, monospace" font-size="24" fill="#94A3B8">Typed, validated structured outputs from LLMs</text>

  <!-- motif: scattered dots -> schema braces -> aligned records -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- unstructured input: scattered dots -->
    <circle cx="780" cy="100" r="5" fill="#38BDF8"/>
    <circle cx="824" cy="132" r="5" fill="#1E3A5F"/>
    <circle cx="770" cy="170" r="5" fill="#38BDF8"/>
    <circle cx="836" cy="196" r="5" fill="#38BDF8"/>
    <circle cx="788" cy="238" r="5" fill="#1E3A5F"/>
    <circle cx="846" cy="258" r="5" fill="#38BDF8"/>
    <circle cx="812" cy="72" r="5" fill="#1E3A5F"/>

    <!-- flow into the schema -->
    <path d="M 834 140 L 872 160" stroke="#1E3A5F" stroke-width="3"/>
    <path d="M 854 248 L 882 188" stroke="#1E3A5F" stroke-width="3"/>

    <!-- schema braces { } -->
    <path d="M 916 106 C 896 106 898 126 898 141 C 898 159 890 168 878 170 C 890 172 898 181 898 199 C 898 214 896 234 916 234"
          stroke="#38BDF8" stroke-width="3"/>
    <path d="M 952 106 C 972 106 970 126 970 141 C 970 159 978 168 990 170 C 978 172 970 181 970 199 C 970 214 972 234 952 234"
          stroke="#38BDF8" stroke-width="3"/>

    <!-- flow out -->
    <path d="M 1000 170 L 1028 170" stroke="#1E3A5F" stroke-width="3"/>
    <path d="M 1020 162 L 1030 170 L 1020 178" stroke="#1E3A5F" stroke-width="3"/>

    <!-- validated output: three aligned records -->
    <rect x="1044" y="98" width="96" height="40" rx="4" stroke="#38BDF8" stroke-width="3"/>
    <rect x="1044" y="150" width="96" height="40" rx="4" stroke="#38BDF8" stroke-width="3"/>
    <rect x="1044" y="202" width="96" height="40" rx="4" stroke="#38BDF8" stroke-width="3"/>
    <path d="M 1058 118 L 1114 118" stroke="#1E3A5F" stroke-width="3"/>
    <path d="M 1058 170 L 1098 170" stroke="#1E3A5F" stroke-width="3"/>
    <path d="M 1058 222 L 1106 222" stroke="#1E3A5F" stroke-width="3"/>
  </g>
</svg>
